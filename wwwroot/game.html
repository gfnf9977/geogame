<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>LocalGuessr - Гра</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">

<div id="loading-overlay">
    <div class="spinner"></div>
    <div>Шукаємо локацію...</div>
</div>
    <div id="pano"></div>

    
    <div id="restrictions-panel"></div>

    <div id="top-left-panel">
        <div id="timer-panel">00:00</div>
        <button id="pause-btn" onclick="togglePause()">⏸ Пауза</button>
    </div>

    <div id="info-panel">Раунд: 1 | Рахунок: 0</div>
    <div id="result-panel"></div>

    <button id="reset-btn">🔙 На початок</button>

    <div id="map-container">
        <div id="map"></div>

        <button id="expand-map-btn" title="Розгорнути мапу">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"></polyline>
                <polyline points="9 21 3 21 3 15"></polyline>
                <line x1="21" y1="3" x2="14" y2="10"></line>
                <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
        </button>

        <button id="submit-btn">ВІДПОВІСТИ</button>
    </div>

    <div id="pause-overlay">
        <div class="pause-title">Гра на паузі</div>
        <div style="display: flex; gap: 15px;">
            <button class="action-btn btn-next" style="margin: 0;" onclick="togglePause()">▶ Продовжити</button>
            <button class="action-btn btn-exit" style="margin: 0;" onclick="window.location.href='index.html'">🚪 Вийти в меню</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="game.js"></script>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBjOboBAvGe_cgWOWyQgkJqfyF1Z4d4bSk&callback=initialize"></script>
</body>
</html>
